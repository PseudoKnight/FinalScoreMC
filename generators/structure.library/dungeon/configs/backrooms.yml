    ceiling: bamboo_planks
    randomblocks: [brown_mushroom,'glow_lichen[down=true]']
    trim: pale_moss_carpet
    roomTypes:
      columns:
        chance: 0.5
      open:
        chance: 0.5
rooms:
  columns:
    column: stripped_bamboo_block[axis=y]
    window: bamboo_mosaic
  open:
    column: air
    window: chiseled_bookshelf