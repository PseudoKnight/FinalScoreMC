  minRoomHeight: 4
  maxRoomHeight: 4
  minRoomSize: 5
  maxRoomSize: 25
  spawnerChance: 0.0
  extraDoorChance: 0.95
  randomBlockChance: 0.004
  campfireChance: 0.04
  rugs: 0.7
  roof: false
floors:
